version: '3'

tasks:
  setup:
    desc: Install/update pinned dev tools from go.mod
    cmds:
      - go get -tool github.com/air-verse/air
      - go get -tool github.com/sqlc-dev/sqlc/cmd/sqlc
      - go mod tidy
  
  templ:
    cmds: 
      - go tool templ generate
    sources: 
      - templates/*.templ
    generates:
      - templates/*.go

  sqlc:
    cmds:
      - go tool sqlc generate
    sources:
      - database/queries/*.sql
      - sqlc.yaml
    generates:
      - database/sqlcgen/*.go

  go:build:
    desc: Build for production
    deps: [sqlc]
    cmds:
      - mkdir -p ./release
      - go build -o ./release/runway .
      - echo "Release built in ./release/"

  clean:
    desc: Clean build artifacts (including database)
    cmds:
      - rm -rf ./tmp
      - rm -rf ./release
      - rm -rf ./data

  default:
    desc: Run and watch with air
    deps: [sqlc, templ]
    cmds:
      - go tool air